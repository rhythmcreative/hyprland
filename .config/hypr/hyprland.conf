# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/
# Please note not all available settings / options are set here.
# For a full list, see the wiki
# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf
### PLUGINS ###
# Load hyprexpo plugin
# plugin = /usr/lib/libhyprexpo.so
# Import pywal colors (generated dynamically)
source = ~/.cache/wal/colors-hyprland-enhanced.conf
### MONITORS ###
# See https://wiki.hypr.land/Configuring/Monitors/
# Import monitor configuration from nwg-displays
source = ~/.config/hypr/monitors.conf
### MY PROGRAMS ###
# See https://wiki.hypr.land/Configuring/Keywords/
# Set programs that you use
$terminal = warp-terminal
$fileManager = dolphin
$menu = rofi -show drun
### AUTOSTART ###
exec-once = hyprpm reload
#  OPTIMIZADO PARA INICIO ULTRA R├БPIDO 
# FASE 1: Servicios cr├нticos con prioridad m├бxima (inicio inmediato)
exec-once = [workspace 1 silent] ~/.config/waybar/launch.sh
exec-once = [workspace 1 silent] swww-daemon --format xrgb &
# FASE 2: Servicios de red (con delay m├нnimo para no bloquear)
exec-once = sleep 0.1 && nm-applet &
# FASE 3: Servicios de notificaciones (Deshabilitado)
# exec-once = sleep 0.2 && mako &
# FASE 4: Wallpaper con delay ultra reducido (optimizado para speed)
exec-once = sleep 0.3 && ~/.local/bin/load-last-wallpaper-fast
# FASE 5: Dock (inicio diferido para no competir por recursos)
exec-once = nwg-dock-hyprland
#  DESHABILITADOS: Servicios que causan lentitud 
# exec-once = systemctl --user start sddm-wallpaper-watcher.service
# exec-once = systemctl --user start pywal-auto-sync.service
### ENVIRONMENT VARIABLES ###
# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
#env = HYPRCURSOR_THEME,Bibata-Modern-Ice
### LOOK AND FEEL ###
# Refer to https://wiki.hypr.land/Configuring/Variables/
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    # Dynamic colors from pywal - will be sourced from colors-hyprland.conf (using blue instead of red)
    col.active_border = $color6
    col.inactive_border = $color8
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false
    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    layout = dwindle
}
# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    # Change transparency of focused and unfocused windows
    active_opacity = 0.85
    inactive_opacity = 0.85
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $background
    }
    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 15
        passes = 3
        vibrancy = 0.5
    }
}
# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true
    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}
# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]
# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}
# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}
# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    #  CONFIGURACI├УN ULTRA FAST PARA INICIO R├БPIDO 
    # Deshabilitaci├│n completa de elementos gr├бficos innecesarios
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    # Optimizaciones de rendimiento m├бximo
    # vfr moved to debug in newer versions
    vrr = 1                             # Variable refresh rate
    # Configuraciones para inicio ultra r├бpido
    animate_manual_resizes = false      # Disable para reducir overhead al inicio
    animate_mouse_windowdragging = false # Disable drag animations para speed
    # Terminal swallowing optimizado
    enable_swallow = true
    swallow_regex = ^(kitty|warp-terminal)$
    # ЁЯФз OPTIMIZACIONES ADICIONALES PARA HYPRLAND ULTRA FAST ЁЯФз
    # Reducir latencia en ventanas nuevas
    # new_window_takes_over_fullscreen = 1
    # Focus optimizations
    focus_on_activate = true
    # Layer optimization para mejor rendimiento en overlays
    layers_hog_keyboard_focus = false
}
debug {
    vfr = true
}
### INPUT ###
# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,es
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}
# https://wiki.hypr.land/Configuring/Variables/#gestures
gestures {
   # workspace_swipe = false
}
# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
### KEYBINDINGS ###
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, warp-terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, W, togglefloating,
# Rofi adaptativo con style-3.rasi que se ajusta autom├бticamente al monitor activo
bind = $mainMod, A, exec, ~/.local/bin/rofi-style3-monitor-adaptive
# Rofi run mode (comandos) - Super + R
bind = $mainMod, R, exec, ~/.local/bin/adaptive-rofi run
# Workspace overview - Super + Tab
bind = $mainMod, Tab, workspace, overview
# Rofi window selector - Super + Alt + Tab (moved to avoid conflict)
bind = $mainMod ALT, Tab, exec, ~/.local/bin/adaptive-rofi window
# bind = $mainMod, P, pseudo, # dwindle - Movido para evitar conflicto con screenshot
# Toggle Waybar orientation (Horizontal/Vertical)
# bind = $mainMod, C, exec, ~/.config/waybar/toggle_waybar.sh
# Screenshot with swappy - Super + P
bind = $mainMod, P, exec, grim -g "$(slurp)" - | swappy -f -
# Color picker with hyprpicker - Super + Shift + P
bind = $mainMod SHIFT, P, exec, hyprpicker -a
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
# Toggle fullscreen with Alt + Enter
bind = ALT, Return, fullscreen, 0
# Lock screen with hyprlock
bind = $mainMod, L, exec, hyprlock
# bind = $mainMod, B, exec, ~/.config/hypr/scripts/swww_random.sh
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/toggle_performance.sh
# Powermenu de rofi con detecci├│n autom├бtica de monitor
bind = $mainMod, BackSpace, exec, ~/.local/bin/powermenu-with-monitor-detection
bind = $mainMod, XF86Back, exec, ~/.local/bin/pywal-wallpaper-sync
bind = $mainMod, Prior, exec, ~/.local/bin/pywal-wallpaper-sync
bind = $mainMod SHIFT, BackSpace, exec, ~/.local/bin/powermenu-with-monitor-detection
# Rofi Wallpaper Changer (Adaptive)
bind = $mainMod SHIFT, W, exec, ~/.local/bin/wallpaper-selector
# Wallpaper changer ADAPTATIVO con sincronizaci├│n AUTOM├БTICA de SDDM - Super + Shift + B
bind = $mainMod SHIFT, B, exec, ~/.local/bin/wallpaper-change-adaptive
# Wallpaper selector SIMPLE - Super + Alt + W  
bind = $mainMod ALT, W, exec, ~/.local/bin/wallpaper-changer-with-waybar-sync
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Screenshot with swappy
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -
# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Laptop multimedia keys for volume and LCD brightness - no notifications
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
# Toggle bluetooth with F10
bind = , F10, exec, ~/.local/bin/toggle-bluetooth
# Toggle keyboard layout between English and Spanish with Super + K
bind = $mainMod, K, exec, ~/.local/bin/toggle-keyboard-layout
# Volume control with F11/F12
bind = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# Keyboard backlight control (Fn+F2/F3 on ASUS)
bind = , XF86KbdBrightnessDown, exec, ~/.local/bin/keyboard-backlight down
bind = , XF86KbdBrightnessUp, exec, ~/.local/bin/keyboard-backlight up
### WINDOWS AND WORKSPACES ###
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps.
windowrule = match:class .*, suppress_event maximize 1

# Rofi layer rules - blur en el fondo
layerrule = match:namespace rofi, blur 1
#
## Fix some dragging issues with XWayland
#windowrule = match:class ^$ match:title ^$ match:xwayland 1, no_focus 1
#
#  ULAUNCHER - Windows 11 Style Menu with Super+Space 
bind = $mainMod, Space, exec, ulauncher-toggle
#  HYPREXPO PLUGIN CONFIGURATION 
plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1
        enable_gesture = on # laptop touchpad
        fingers = 3  # 3 or 4
        distance = 300 # how far is the "max"
        positive = on # positive = swipe down. Negative = swipe up.
    }
}
exec-once = hypridle
# exec-once = ~/.config/hypr/scripts/auto_power_save.sh

# Power Saving Toggle
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/power_save.sh
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __NV_PRIME_RENDER_OFFLOAD,1
